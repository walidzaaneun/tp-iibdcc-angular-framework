<div class="p-3">
  <div class="card-body">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Selected</th>
        </tr>
      </thead>
      <tbody>
        @for (p of products; track p) {
          <tr>
            <td>{{p.id}}</td>
            <td>{{p.name}}</td>
            <td>{{p.price}}</td>
            <td>
              @if (p.selected){
                <i class="bi bi-check-circle text-success"></i>
              } @else {
                <i class="bi bi-x-circle text-danger"></i>
              }
            </td>
            <td>
              <button (click)="handleDelete(p)" class="btn btn-outline-danger">
                <i class="bi-trash-fill"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
